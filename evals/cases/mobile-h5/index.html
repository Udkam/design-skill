<main class="pickup-flow">
  <header>
    <h1>Choose a pickup window</h1>
    <p>Loading windows keep your selected address in place. Empty days show the next available date.</p>
  </header>
  <section class="slot-list" aria-label="Pickup windows">
    <button class="slot is-selected">Today 14:00 - 16:00</button>
    <button class="slot">Tomorrow 09:00 - 11:00</button>
    <button class="slot" disabled>Friday disabled: route is full</button>
  </section>
  <img src="/assets/pickup-route.webp" alt="Pickup route preview with selected address marker">
  <p class="state-copy">Error messages keep retry visible. Success confirms the booked window.</p>
  <button class="primary">Confirm pickup</button>
</main>
