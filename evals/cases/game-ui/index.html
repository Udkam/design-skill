<main class="game-shell">
  <header class="hud">
    <h1>Pulse Tiles</h1>
    <p>Score 420 · Pending combo</p>
    <button class="pause">Pause</button>
    <button class="restart" disabled>Restart disabled during loading</button>
  </header>
  <section class="board" aria-label="Timing tile board">
    <button class="tile is-selected">Success tile</button>
    <button class="tile">Tap</button>
    <button class="tile error-state">Error miss</button>
    <button class="tile">Empty lane</button>
  </section>
  <img src="/assets/tile-spark.webp" alt="Tile feedback spark preview">
</main>
